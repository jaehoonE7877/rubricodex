name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check whitespace
        run: git show --check --pretty=format: HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python package
        run: python -m pip install -e . pytest

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Run pytest contract tests
        run: python -m pytest -q

      - name: Run hook gate smoke tests
        run: |
          printf '%s\n' '{"prompt":"@Rubricodex help me plan a small change"}' | python -m rubricodex.cli hook gate intake-boundary
          printf '%s\n' '{"prompt":"@Rubricodex implement --run-id smoke"}' | python -m rubricodex.cli hook gate matrix-readiness
          printf '%s\n' '{"last_assistant_message":"Rubricodex task complete."}' | python -m rubricodex.cli hook gate completion-claim

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run source-code endpoint fixture tests
        working-directory: examples/source-code-endpoint
        run: npm test
