name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python package
        run: python -m pip install -e .

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run source-code endpoint fixture tests
        working-directory: examples/source-code-endpoint
        run: npm test
