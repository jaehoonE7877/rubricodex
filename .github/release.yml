changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
  categories:
    - title: Breaking changes
      labels:
        - breaking-change
        - semver-major
    - title: Features
      labels:
        - "✨ feature"
        - feature
    - title: Bug fixes
      labels:
        - "🐞 bug"
    - title: Documentation / repo meta
      labels:
        - "📝 docs"
        - "🧹 chore"
        - repo-meta
    - title: Other changes
      labels:
        - "*"
