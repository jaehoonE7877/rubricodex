<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="squircle" clipPathUnits="objectBoundingBox">
      <rect x="0" y="0" width="1" height="1" rx="0.225" ry="0.225"></rect>
    </clipPath>

    <linearGradient id="cloud-diag" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8C8FF"></stop>
      <stop offset="22%" stop-color="#BCE3FF"></stop>
      <stop offset="48%" stop-color="#D9CFFB"></stop>
      <stop offset="72%" stop-color="#F5B8C6"></stop>
      <stop offset="100%" stop-color="#F8E9D8"></stop>
    </linearGradient>

    <radialGradient id="cloud-bloom" cx="38%" cy="34%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"></stop>
      <stop offset="35%" stop-color="#E8F2FF" stop-opacity="0.20"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="cloud-warm" cx="86%" cy="84%" r="50%">
      <stop offset="0%" stop-color="#F8E9D8" stop-opacity="0.65"></stop>
      <stop offset="55%" stop-color="#F5B8C6" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#F5B8C6" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="rim-light" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"></stop>
      <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </linearGradient>

    <radialGradient id="lens-disc" cx="40%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"></stop>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.28"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.10"></stop>
    </radialGradient>

    <radialGradient id="core-fill" cx="42%" cy="36%" r="76%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.98"></stop>
      <stop offset="40%" stop-color="#FFF1DA" stop-opacity="0.96"></stop>
      <stop offset="80%" stop-color="#F8D5C0" stop-opacity="0.85"></stop>
      <stop offset="100%" stop-color="#E5A8C0" stop-opacity="0.70"></stop>
    </radialGradient>

    <radialGradient id="core-bloom" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#FFE9C8" stop-opacity="0.55"></stop>
      <stop offset="55%" stop-color="#FFE9C8" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#FFE9C8" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="lens-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"></stop>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.06"></stop>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#cloud-diag)"></rect>
    <rect width="1024" height="1024" fill="url(#cloud-bloom)"></rect>
    <rect width="1024" height="1024" fill="url(#cloud-warm)"></rect>
    <rect width="1024" height="1024" fill="url(#rim-light)"></rect>

    <rect x="220" y="220" width="584" height="584" fill="url(#lens-halo)"></rect>

    <circle cx="512" cy="512" r="230" fill="url(#lens-disc)"></circle>
    <circle cx="512" cy="512" r="230" fill="none" stroke="#FFFFFF" stroke-opacity="0.85" stroke-width="3"></circle>
    <circle cx="512" cy="513.2" r="230" fill="none" stroke="#7E9DD6" stroke-opacity="0.22" stroke-width="1.4"></circle>

    <path d="M 678.0 558.5 A 178 178 0 1 0 540.0 690.7" fill="none" stroke="#FFFFFF" stroke-opacity="0.78" stroke-width="2.4" stroke-linecap="round"></path>
    <path d="M 678.0 559.7 A 178 178 0 1 0 540.0 691.9" fill="none" stroke="#7E9DD6" stroke-opacity="0.32" stroke-width="1.2" stroke-linecap="round"></path>

    <path d="M 442.6 632.3 A 138 138 0 1 0 397.7 463.6" fill="none" stroke="#FFFFFF" stroke-opacity="0.78" stroke-width="2.4" stroke-linecap="round"></path>
    <path d="M 442.6 633.5 A 138 138 0 1 0 397.7 464.8" fill="none" stroke="#D69BA8" stroke-opacity="0.30" stroke-width="1.2" stroke-linecap="round"></path>

    <circle cx="512" cy="512" r="118" fill="url(#core-bloom)"></circle>
    <circle cx="512" cy="512" r="72" fill="url(#core-fill)"></circle>
    <circle cx="512" cy="512" r="72" fill="none" stroke="#FFFFFF" stroke-opacity="0.92" stroke-width="1.6"></circle>
    <ellipse cx="490" cy="490" rx="20" ry="12" fill="#FFFFFF" fill-opacity="0.70" transform="rotate(-32 490 490)"></ellipse>
    <circle cx="514" cy="514" r="70" fill="none" stroke="#E1A4BF" stroke-opacity="0.28" stroke-width="1"></circle>

    <rect x="0.5" y="0.5" width="1023" height="1023" fill="none" stroke="#FFFFFF" stroke-opacity="0.30" stroke-width="1.5"></rect>
  </g>
</svg>